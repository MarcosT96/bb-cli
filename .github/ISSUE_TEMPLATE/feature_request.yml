name: Feature request
description: Suggest a command, flag, or MCP tool for bb.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed command or behavior
      placeholder: "e.g. `bb repo rename <new-name>` mapping to PUT /repositories/{repo}."
    validations:
      required: true
  - type: input
    id: endpoint
    attributes:
      label: Relevant Bitbucket API endpoint (if known)
      description: Helps confirm the feature is possible against the Bitbucket API.
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
