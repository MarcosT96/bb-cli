name: Bug report
description: Something in bb isn't working as expected.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, and what went wrong?
      placeholder: "e.g. `bb pr list` returned an error instead of the open PRs."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: bb version
      description: Output of `bb --version`.
      placeholder: "bb 0.3.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (aarch64)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / error
      description: Paste the command output. Redact any tokens or private data.
      render: shell
